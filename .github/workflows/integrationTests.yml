name: Integration Tests

on:
  schedule:
  - cron: 0 2 * * 1-5
  workflow_dispatch:

jobs:
  unit:
    name: Run Unit Tests
    strategy:
      fail-fast: false
      matrix:
        env:
          - xcode: "Xcode_16.2"
            os: "macos-14"
            iossim: "iPhone 16"
            tvossim: "Apple TV"
          - xcode: "Xcode_16.4"
            os: "macos-15"
            iossim: "iPhone 16"
            tvossim: "Apple TV"
          - xcode: "Xcode_26.0"
            os: "macos-26"
            iossim: "iPhone 17"
            tvossim: "Apple TV"
          - xcode: "Xcode_26.2"
            os: "macos-26"
            iossim: "iPhone 17"
            tvossim: "Apple TV"
    runs-on: ${{ matrix.env.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Select ${{ matrix.env.xcode }}
      run: sudo xcode-select --switch /Applications/${{ matrix.env.xcode }}.app
    - name: Unit tests
      run: make XC_LOG=unit IOS_SIMULATOR="${{ matrix.env.iossim }}" TVOS_SIMULATOR="${{ matrix.env.tvossim }}" tests/unit
    - name: Attach Xcode logs
      if: '!cancelled()'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ matrix.env.xcode }}-unit-logs
        path: "*-unit.log"

  integration:
    name: Run Integration Tests
    strategy:
      fail-fast: false
      matrix:
        env:
          - xcode: "Xcode_16.2"
            os: "macos-14"
            iossim: "iPhone 16"
            tvossim: "Apple TV"
          - xcode: "Xcode_16.4"
            os: "macos-15"
            iossim: "iPhone 16"
            tvossim: "Apple TV"
          - xcode: "Xcode_26.0"
            os: "macos-26"
            iossim: "iPhone 17"
            tvossim: "Apple TV"
          - xcode: "Xcode_26.2"
            os: "macos-26"
            iossim: "iPhone 17"
            tvossim: "Apple TV"
        platform: ["macOS", "iOSsim", "tvOSsim"]
    runs-on: ${{ matrix.env.os }}
    env:
      DD_API_KEY: '${{ secrets.DD_API_KEY }}'
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
    - name: Select ${{ matrix.env.xcode }}
      run: sudo xcode-select --switch /Applications/${{ matrix.env.xcode }}.app
    - name: Run tests for ${{ matrix.platform }}
      run: make XC_LOG=integration IOS_SIMULATOR="${{ matrix.env.iossim }}" TVOS_SIMULATOR="${{ matrix.env.tvossim }}" tests/integration/${{ matrix.platform }}
    - name: Attach Xcode logs
      if: '!cancelled()'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ matrix.env.xcode }}-${{ matrix.platform }}-integration-log
        path: "*-integration.log"

