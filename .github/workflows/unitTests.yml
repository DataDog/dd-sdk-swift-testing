name: Unit Tests

on:
  pull_request:
    branches-ignore:
      - 'release-*'
      - 'release/*'
  workflow_dispatch:
  workflow_call:

jobs:
  unit:
    name: Run Unit Tests
    strategy:
      fail-fast: false
      matrix:
        env:
          - xcode: "Xcode_26.1"
            os: "macos-26"
            iossim: "iPhone 17"
            tvossim: "Apple TV"
          - xcode: "Xcode_26.2"
            os: "macos-26"
            iossim: "iPhone 17"
            tvossim: "Apple TV"
          - xcode: "Xcode_26.4"
            os: "macos-26"
            iossim: "iPhone 17"
            tvossim: "Apple TV"
    runs-on: ${{ matrix.env.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Select ${{ matrix.env.xcode }}
      run: sudo xcode-select --switch /Applications/${{ matrix.env.xcode }}.app
    - name: Unit tests
      run: make XC_LOG=unit IOS_SIMULATOR="${{ matrix.env.iossim }}" TVOS_SIMULATOR="${{ matrix.env.tvossim }}" tests/unit
    - name: Attach Xcode logs
      if: '!cancelled()'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ matrix.env.xcode }}-unit-logs
        path: "*-unit.log"
